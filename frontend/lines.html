<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קווי הסעה - הסעות הרצליה</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo"><div style="font-size:28px;">🚌</div><div style="font-weight:700;font-size:14px;margin-top:6px;">הסעות הרצליה</div><h6>מערכת ניהול תחבורה</h6></div>
    <div style="padding:12px 0;">
      <a href="index.html" class="nav-link"><i class="bi bi-speedometer2"></i> דשבורד</a>
      <a href="analysis.html" class="nav-link"><i class="bi bi-robot"></i> ניתוח WhatsApp הורים</a>
      <a href="student-analysis.html" class="nav-link"><i class="bi bi-mortarboard"></i> ניתוח WhatsApp תלמידים</a>
      <a href="weekly.html" class="nav-link"><i class="bi bi-calendar-week"></i> נסיעות שבועיות</a>
      <a href="tasks.html" class="nav-link"><i class="bi bi-check2-square"></i> משימות</a>
      <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 16px;"></div>
      <a href="students.html" class="nav-link"><i class="bi bi-people"></i> תלמידים</a>
      <a href="zones.html" class="nav-link"><i class="bi bi-map"></i> אזורים</a>
      <a href="lines.html" class="nav-link active"><i class="bi bi-signpost-2"></i> קווים</a>
      <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 16px;"></div>
      <a href="optimization.html" class="nav-link"><i class="bi bi-map-fill"></i> מפה</a>
      <a href="reports.html" class="nav-link"><i class="bi bi-file-earmark-text"></i> דוחות</a>
    </div>
    <div style="position:absolute;bottom:0;right:0;left:0;padding:16px;border-top:1px solid rgba(255,255,255,0.1);">
      <a href="#" onclick="Auth.logout()" style="color:rgba(255,255,255,0.7);font-size:12px;text-decoration:none;"><i class="bi bi-box-arrow-left"></i> יציאה</a>
    </div>
  </nav>
  <div id="main-content">
    <div id="topbar">
      <div style="font-size:15px;font-weight:600;"><i class="bi bi-signpost-2" style="color:#7c3aed;"></i> ניהול קווי הסעה</div>
    </div>
    <div id="page-content">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;" id="linesGrid"></div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
if (!Auth.requireAuth()) {}
const lineColors = {'1A':'#3b82f6','1B':'#16a34a','1C':'#8b5cf6'};

async function loadLines() {
  const lines = await API.lines();
  document.getElementById('linesGrid').innerHTML = lines.map(l => {
    const color = lineColors[l.code]||'#64748b';
    const statusBadge = l.status==='active'?'<span style="background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:10px;font-size:11px;">פעיל</span>':l.status==='planned'?'<span style="background:#fffbeb;color:#d97706;padding:2px 8px;border-radius:10px;font-size:11px;">מתוכנן</span>':'<span style="background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:10px;font-size:11px;">מושהה</span>';
    const waypoints = l.waypoints||[];
    return `
      <div style="background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">
        <div style="background:${color};padding:20px;color:white;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:22px;font-weight:800;">${l.name}</div>
            ${statusBadge}
          </div>
          <div style="font-size:13px;opacity:0.85;margin-top:4px;">${l.description||''}</div>
        </div>
        <div style="padding:16px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
            <div style="text-align:center;padding:10px;background:#f8fafc;border-radius:8px;">
              <div style="font-size:24px;font-weight:700;color:${color};">${l.student_count||0}</div>
              <div style="font-size:11px;color:#94a3b8;">תלמידים</div>
            </div>
            <div style="text-align:center;padding:10px;background:#f8fafc;border-radius:8px;">
              <div style="font-size:24px;font-weight:700;color:${color};">${l.capacity}</div>
              <div style="font-size:11px;color:#94a3b8;">קיבולת ${l.vehicle_type==='bus'?'(אוטובוס)':'(מיניבוס)'}</div>
            </div>
          </div>
          ${waypoints.length?`
            <div style="margin-bottom:12px;">
              <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;">תחנות:</div>
              <div style="display:flex;flex-direction:column;gap:4px;">
                ${waypoints.sort((a,b)=>a.order-b.order).map((w,i)=>`
                  <div style="display:flex;align-items:center;gap:8px;font-size:12px;">
                    <div style="width:20px;height:20px;border-radius:50%;background:${color};color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;">${i+1}</div>
                    <span>${w.label}</span>
                    ${w.time?`<span style="color:#94a3b8;margin-right:auto;">${w.time}</span>`:''}
                  </div>
                `).join('<div style="width:1px;height:8px;background:#e2e8f0;margin-right:10px;"></div>')}
              </div>
            </div>
          `:'<div style="color:#94a3b8;font-size:12px;text-align:center;padding:12px;">אין תחנות מוגדרות</div>'}
          <div style="display:flex;gap:6px;">
            <a href="optimization.html" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;"><i class="bi bi-map"></i> הצג במפה</a>
            <a href="weekly.html" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;"><i class="bi bi-graph-up"></i> נתוני RUP</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}
loadLines();
</script>
</body>
</html>
