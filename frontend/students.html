<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תלמידים - הסעות הרצליה</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo"><div style="font-size:28px;">🚌</div><div style="font-weight:700;font-size:14px;margin-top:6px;">הסעות הרצליה</div><h6>מערכת ניהול תחבורה</h6></div>
    <div style="padding:12px 0;">
      <a href="index.html" class="nav-link"><i class="bi bi-speedometer2"></i> דשבורד</a>
      <a href="analysis.html" class="nav-link"><i class="bi bi-robot"></i> ניתוח WhatsApp הורים</a>
      <a href="student-analysis.html" class="nav-link"><i class="bi bi-mortarboard"></i> ניתוח WhatsApp תלמידים</a>
      <a href="weekly.html" class="nav-link"><i class="bi bi-calendar-week"></i> נסיעות שבועיות</a>
      <a href="tasks.html" class="nav-link"><i class="bi bi-check2-square"></i> משימות</a>
      <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 16px;"></div>
      <a href="students.html" class="nav-link active"><i class="bi bi-people"></i> תלמידים</a>
      <a href="zones.html" class="nav-link"><i class="bi bi-map"></i> אזורים</a>
      <a href="lines.html" class="nav-link"><i class="bi bi-signpost-2"></i> קווים</a>
      <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 16px;"></div>
      <a href="optimization.html" class="nav-link"><i class="bi bi-map-fill"></i> מפה</a>
      <a href="reports.html" class="nav-link"><i class="bi bi-file-earmark-text"></i> דוחות</a>
      <a href="backup.html" class="nav-link"><i class="bi bi-shield-check"></i> גיבוי ושחזור</a>
    </div>
    <div style="position:absolute;bottom:0;right:0;left:0;padding:16px;border-top:1px solid rgba(255,255,255,0.1);">
      <a href="#" onclick="Auth.logout()" style="color:rgba(255,255,255,0.7);font-size:12px;text-decoration:none;"><i class="bi bi-box-arrow-left"></i> יציאה</a>
    </div>
  </nav>
  <div id="main-content">
    <div id="topbar">
      <div style="font-size:15px;font-weight:600;"><i class="bi bi-people-fill" style="color:#f59e0b;"></i> ניהול תלמידים</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="countBadge" style="background:#eff6ff;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:12px;"></span>
        <button onclick="openAdd()" class="btn btn-primary btn-sm" id="addBtn"><i class="bi bi-plus"></i> הוסף תלמיד</button>
      </div>
    </div>
    <div id="page-content">
      <!-- Stats charts -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
        <div class="card"><div class="card-title">לפי אזור</div><div style="height:160px;"><canvas id="zoneChart"></canvas></div></div>
        <div class="card"><div class="card-title">לפי בית ספר</div><div style="height:160px;"><canvas id="schoolChart"></canvas></div></div>
        <div class="card"><div class="card-title">לפי קו</div><div style="height:160px;"><canvas id="lineChart"></canvas></div></div>
      </div>

      <!-- Filters + Table -->
      <div class="card">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
          <input type="text" id="searchInput" class="form-control" placeholder="חיפוש שם או כתובת..." style="width:220px;" oninput="loadStudents()">
          <select id="zoneFilter" class="form-control" style="width:150px;" onchange="loadStudents()">
            <option value="">כל האזורים</option>
          </select>
          <select id="lineFilter" class="form-control" style="width:150px;" onchange="loadStudents()">
            <option value="">כל הקווים</option>
          </select>
          <select id="schoolFilter" class="form-control" style="width:160px;" onchange="loadStudents()">
            <option value="">כל בתי הספר</option>
          </select>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>שם תלמיד</th><th>בית ספר</th><th>אזור</th><th>קו</th><th>כתובת</th><th>הורה</th><th>פעולות</th></tr></thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">הוספת תלמיד</div>
      <span class="modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">שם מלא *</label><input type="text" id="fName" class="form-control"></div>
      <div class="form-group"><label class="form-label">בית ספר</label><select id="fSchool" class="form-control"><option value="">בחר...</option></select></div>
      <div class="form-group"><label class="form-label">אזור</label><select id="fZone" class="form-control"><option value="">בחר...</option></select></div>
      <div class="form-group"><label class="form-label">קו הסעה</label><select id="fLine" class="form-control"><option value="">בחר...</option></select></div>
      <div class="form-group" style="grid-column:span 2;"><label class="form-label">כתובת</label><input type="text" id="fAddress" class="form-control" placeholder="רחוב, מספר, עיר"></div>
      <div class="form-group"><label class="form-label">שם הורה</label><input type="text" id="fParent" class="form-control"></div>
      <div class="form-group"><label class="form-label">טלפון הורה</label><input type="tel" id="fPhone" class="form-control" dir="ltr"></div>
      <div class="form-group" style="grid-column:span 2;">
      </div>
    </div>
    <div id="modalAlert" style="display:none;" class="alert"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button onclick="closeModal()" class="btn btn-outline">ביטול</button>
      <button onclick="saveStudent()" class="btn btn-primary" id="saveBtn">שמור</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if (!Auth.requireAuth()) {}
const canEdit = Auth.hasRole('admin','manager');
let editId = null, allZones=[], allLines=[], allSchools=[];

async function init() {
  const [zones, lines, stats] = await Promise.all([API.zones(), API.lines(), API.studentStats()]);
  allZones=zones; allLines=lines;

  // Populate filters
  zones.forEach(z => {
    [document.getElementById('zoneFilter'), document.getElementById('fZone')].forEach(s=>s.appendChild(new Option(z.name,z.id)));
  });
  lines.forEach(l => {
    [document.getElementById('lineFilter'), document.getElementById('fLine')].forEach(s=>s.appendChild(new Option(l.name,l.id)));
  });

  // Schools from stats
  stats.by_school.forEach(s => {
    allSchools.push(s);
    document.getElementById('schoolFilter').appendChild(new Option(s.name, s.name));
    document.getElementById('fSchool').appendChild(new Option(s.name, s.name));
  });

  // Charts
  const zoneColors = zones.map(z=>z.color||'#3b82f6');
  new Chart(document.getElementById('zoneChart'), { type:'doughnut', data:{ labels:stats.by_zone.map(z=>z.name), datasets:[{data:stats.by_zone.map(z=>z.count),backgroundColor:stats.by_zone.map(z=>z.color||'#3b82f6')}] }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}} });
  new Chart(document.getElementById('schoolChart'), { type:'bar', data:{ labels:stats.by_school.map(s=>s.name.replace('תיכון ','')), datasets:[{data:stats.by_school.map(s=>s.count),backgroundColor:'#3b82f680',borderColor:'#3b82f6',borderWidth:1}] }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}} });
  new Chart(document.getElementById('lineChart'), { type:'pie', data:{ labels:stats.by_line.map(l=>l.name), datasets:[{data:stats.by_line.map(l=>l.count),backgroundColor:['#3b82f680','#16a34a80','#8b5cf680']}] }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}} });

  document.getElementById('countBadge').textContent = `${stats.total} תלמידים רשומים`;
  if (!canEdit) document.getElementById('addBtn').style.display='none';
  loadStudents();
}

async function loadStudents() {
  const params = {};
  const s=document.getElementById('searchInput').value.trim();
  const z=document.getElementById('zoneFilter').value;
  const l=document.getElementById('lineFilter').value;
  if (s) params.search=s;
  if (z) params.zone_id=z;
  if (l) params.line_id=l;

  const students = await API.students(params);
  const schoolF = document.getElementById('schoolFilter').value;
  const filtered = schoolF ? students.filter(s=>s.school_name===schoolF) : students;

  document.getElementById('studentTable').innerHTML = filtered.map(s=>`
    <tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.school_name||'-'}</td>
      <td><span style="background:${zoneColor(s.zone_id)}20;color:${zoneColor(s.zone_id)};padding:2px 8px;border-radius:10px;font-size:11px;">${s.zone_name||'-'}</span></td>
      <td>${s.line_name ? `<span style="font-size:12px;">${s.line_code}</span>` : '<span style="color:#94a3b8;">-</span>'}</td>
      <td style="font-size:12px;color:#64748b;">${s.address||'-'}</td>
      <td style="font-size:12px;">${s.parent_name||''} ${s.parent_phone?'<br><span style="color:#94a3b8;">'+s.parent_phone+'</span>':''}</td>
      <td>${canEdit?`<button onclick="openEdit(${s.id})" class="btn btn-outline btn-sm"><i class="bi bi-pencil"></i></button>`:''}
      </td>
    </tr>
  `).join('') || '<tr><td colspan="8" style="text-align:center;color:#94a3b8;">אין תלמידים</td></tr>';
}

function zoneColor(zoneId) {
  return allZones.find(z=>z.id==zoneId)?.color || '#64748b';
}

function openAdd() { editId=null; document.getElementById('modalTitle').textContent='הוספת תלמיד'; clearForm(); document.getElementById('modal').style.display='flex'; }

async function openEdit(id) {
  const students = await API.students({ search:'' });
  const s = students.find(st=>st.id===id);
  if (!s) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'עריכת תלמיד';
  document.getElementById('fName').value = s.name||'';
  document.getElementById('fAddress').value = s.address||'';
  document.getElementById('fParent').value = s.parent_name||'';
  document.getElementById('fPhone').value = s.parent_phone||'';
  setSelect('fZone', s.zone_id); setSelect('fLine', s.line_id);
  document.getElementById('modal').style.display='flex';
}

function setSelect(id, val) { const el=document.getElementById(id); for(const o of el.options) if(o.value==val){o.selected=true;break;} }
function clearForm() { ['fName','fAddress','fParent','fPhone'].forEach(id=>document.getElementById(id).value=''); document.getElementById('fApp').checked=false; }
function closeModal() { document.getElementById('modal').style.display='none'; document.getElementById('modalAlert').style.display='none'; }

async function saveStudent() {
  const name=document.getElementById('fName').value.trim();
  if(!name){showModalAlert('שם חובה','danger');return;}
  const data={name,school_id:document.getElementById('fSchool').value||null,zone_id:document.getElementById('fZone').value||null,line_id:document.getElementById('fLine').value||null,address:document.getElementById('fAddress').value,parent_name:document.getElementById('fParent').value,parent_phone:document.getElementById('fPhone').value};
  try {
    if(editId) await API.updateStudent(editId,data); else await API.createStudent(data);
    closeModal(); loadStudents(); toast(editId?'✅ תלמיד עודכן':'✅ תלמיד נוסף');
  } catch(err){showModalAlert('❌ '+err.message,'danger');}
}
function showModalAlert(msg,type){const el=document.getElementById('modalAlert');el.className=`alert alert-${type}`;el.textContent=msg;el.style.display='block';}
init();
</script>
</body>
</html>
